<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="GraphClaw — open-source AI task orchestration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4a6e" />
      <stop offset="55%" stop-color="#0369a1" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1040" cy="120" r="420" fill="#38bdf8" opacity="0.10" />
  <circle cx="120" cy="560" r="320" fill="#0ea5e9" opacity="0.12" />

  <!-- brand mark -->
  <g transform="translate(90,150)">
    <rect width="120" height="120" rx="28" fill="url(#mark)" />
    <g stroke="#f0f9ff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.95" transform="scale(1.875)">
      <path d="M21 21 L21 43" />
      <path d="M21 21 L43 16" />
      <path d="M21 43 L43 48" />
      <path d="M21 32 L43 32" />
    </g>
    <g fill="#f0f9ff" transform="scale(1.875)">
      <circle cx="21" cy="21" r="6" />
      <circle cx="21" cy="43" r="6" />
      <circle cx="43" cy="32" r="7.5" />
    </g>
  </g>

  <text x="240" y="222" fill="#f0f9ff" font-family="Inter, Segoe UI, sans-serif" font-size="92" font-weight="800" letter-spacing="-2">GraphClaw</text>
  <text x="92" y="360" fill="#e0f2fe" font-family="Inter, Segoe UI, sans-serif" font-size="40" font-weight="600">Open-source AI task orchestration on a property graph</text>
  <text x="92" y="430" fill="#bae6fd" font-family="Inter, Segoe UI, sans-serif" font-size="30">Dependencies · 7-factor scoring · auditable lifecycle · self-hosted</text>
  <text x="92" y="560" fill="#7dd3fc" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="600">graphclaw.ai</text>
</svg>
